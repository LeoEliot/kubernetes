apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metallb
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: metallb-system
  interval: 1h
  path: "./homelab/metallb/app"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: metallb-system
  timeout: 5m
  wait: true