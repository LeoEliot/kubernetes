apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: cert-manager
    namespace: cert-manager
    version: v1.20.1
    repo: https://charts.jetstack.io
    valuesFile: values.yaml
    releaseName: cert-manager

resources:
  - ca-cert.yaml
  - cluster-issuer.yaml

namespace: cert-manager