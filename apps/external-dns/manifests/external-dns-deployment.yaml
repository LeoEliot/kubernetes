apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: external-dns
  template:
    metadata:
      labels:
        app: external-dns
    spec:
      serviceAccountName: external-dns
      containers:
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns
          args:
            - --registry=txt
            - --txt-prefix=external-dns-
            - --txt-owner-id=k8s
            - --provider=rfc2136
            - --rfc2136-host=192.168.1.10
            - --rfc2136-port=53
            - --rfc2136-zone=malef.lan
            - --rfc2136-tsig-secret=SP0tjHmNb+HdGHsQWHftCt4EQ7lMLxfIHZu1W4jhhx8=
            - --rfc2136-tsig-secret-alg=hmac-sha256
            - --rfc2136-tsig-keyname=tsig-key
            - --rfc2136-tsig-axfr
            - --source=ingress
