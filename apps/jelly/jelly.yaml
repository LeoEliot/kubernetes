---
apiVersion: v1
kind: Namespace
metadata:
  name: media
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config-pvc
  namespace: media
  labels:
    app: jellyfin
spec:
  accessModes:
    - ReadWriteOnce # This may vary based on your storage provider
  resources:
    requests:
      storage: 5Gi # Adjust size as needed
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin-deployment
  namespace: media
  labels:
    app: jellyfin
spec:
  replicas: 1 # Typically only one replica for a media server
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:latest # Use a specific tag instead of latest in production
          ports:
            - name: http
              containerPort: 8096 # Main HTTP port
            - name: https
              containerPort: 8920 # HTTPS port (optional)
            # Add other ports for auto-discovery if needed (see Jellyfin docs)
          volumeMounts:
            - name: jellyfin-config-storage
              mountPath: /config
            - name: jellyfin-media-storage
              mountPath: /data # Mount path for your media libraries
      volumes:
        - name: jellyfin-config-storage
          persistentVolumeClaim:
            claimName: jellyfin-config-pvc
        - name: jellyfin-media-storage
          hostPath:
            path: /home/malef/media
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin-service
  namespace: media
spec:
  selector:
    app: jellyfin
  type: LoadBalancer # Use ClusterIP for internal access, or LoadBalancer/NodePort for external access
  ports:
    - protocol: TCP
      port: 8096
      targetPort: 8096
      name: http
    - protocol: TCP
      port: 8920
      targetPort: 8920
      name: https
