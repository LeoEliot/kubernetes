apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
spec:
  project: default
  destination:
    server: "https://kubernetes.default.svc"
    namespace: kyverno
  source:
    chart: kyverno
    repoURL: https://kyverno.github.io/kyverno/
    targetRevision: 3.7.1
    helm:
      releaseName: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true # Recommended to handle webhooks
    - ApplyOutOfSyncOnly=true # Reduce API pressure
  ignoreDifferences: # Use if specific fields keep changing
  - group: kyverno.io
    kind: ClusterPolicy
    jsonPointers:
    - /spec/rules/0/exclude
    - /spec/rules/0/mutate