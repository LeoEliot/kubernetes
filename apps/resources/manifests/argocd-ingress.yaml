apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-ingress
  namespace: argocd
spec:
  rules:
    - host: ''
      http:
        paths:
          - path: ''
            backend:
              service:
                name: ''
                port:
                  number: 80
  tls:
    - hosts: []
      secretName: ''
