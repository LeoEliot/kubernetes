apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-6"
spec:
  project: default
  destination:
    server: "https://kubernetes.default.svc"
    namespace: metallb-system
  source:
    chart: metallb
    repoURL: https://github.com/LeoEliot/kubernetes/apps/metallb/manifests
    targetRevision: v0.1.0
    helm:
      releaseName: metallb
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true # Recommended to handle webhooks